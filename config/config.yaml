# =============================================================================
# s0meter configuration
# =============================================================================

# logLevel defines the minimum log level.
# Messages with at least this level are logged.
# Allowed values: debug | info | warn | error
logLevel: info

# logDestination defines where logs are written to.
# Supported values: stdout | stderr | /path/to/logfile
logDestination: stdout

# =============================================================================
# Webserver configuration (HTTPS)
# =============================================================================
webserver:
  # Host address the HTTPS server listens on (0.0.0.0 = all interfaces)
  listenHost: 0.0.0.0

  # Port the HTTPS server listens on
  listenPort: 443

  # Global API key for protected endpoints
  apiKey: changeme!

  # TLS private key file
  keyFile: /opt/s0meter/etc/key.pem

  # TLS certificate file
  certFile: /opt/s0meter/etc/cert.pem

  # Blocked IP addresses or networks (empty = none blocked)
  # Examples: 192.168.0.1, 192.168.0.0/16, 10.0.0.0/8
  blockedIPs: []
  #  - 192.168.0.1
  #  - 192.168.0.0/16

  # Allowed IP addresses or networks (empty = all allowed)
  # Note: ::1 is the IPv6 loopback address
  # Examples: 127.0.0.1, ::1, 192.168.0.0/16
  allowedIPs: []
  #  - 127.0.0.1
  #  - ::1
  #  - 192.168.0.0/16

# =============================================================================
# Data collection
# =============================================================================

# File where counters are persisted
dataFile: /opt/s0meter/data/s0meter.yaml

# Interval in seconds for saving counters to dataFile
backupInterval: 60

# =============================================================================
# MQTT configuration (disabled when connection is empty)
# =============================================================================
mqtt:
  # Broker connection string (empty = MQTT disabled)
  connection: "tcp://raspberrypi4.fritz.box:1883"

  # Retain messages on the broker
  retained: false

  # Publish interval in seconds
  publishInterval: 10

# =============================================================================
# S0 Meter configurations
# =============================================================================
# gpio          - GPIO pin for S0 pulse input
# bounceTime    - Debounce time in ms (suppress signal noise)
# unitCounter   - Unit of the total counter (e.g. kWh, m³, l)
# ticksPerUnit  - Pulses per unit, see meter datasheet (Zählerkonstante)
# unitGauge     - Unit of the flow rate (e.g. kW, l/h, l/s)
# scaleFactor   - Scale factor for gauge (e.g. 0.2777778 for m³/h → l/s)
# precision     - Decimal places for rounding the gauge value
# mqttTopic     - MQTT topic to publish to (empty = not published)
# =============================================================================
meter:
  wallbox:
    gpio: 17
    bounceTime: 1
    unitCounter: "kWh"
    ticksPerUnit: 1000
    unitGauge: "kW"
    scaleFactor: 1
    precision: 2
    mqttTopic: test/wallbox/summary

  greywater:
    gpio: 27
    bounceTime: 1
    unitCounter: "l"
    ticksPerUnit: 1
    unitGauge: "l/h"
    scaleFactor: 1
    precision: 0
    mqttTopic: test/rawwater/summary

  drinkingwater:
    gpio: 22
    bounceTime: 1
    unitCounter: "m³"
    ticksPerUnit: 1000
    unitGauge: "l/s"
    scaleFactor: 0.2777778
    precision: 3
    mqttTopic: test/portablewater/summary