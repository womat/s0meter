definitions:
  health.Model:
    properties:
      app:
        description: Application name (MODULE)
        type: string
      appVersion:
        description: Current version of the application
        type: string
      goVersion:
        description: Go runtime version
        type: string
      heapAllocBytes:
        description: Allocated heap memory in bytes
        type: integer
      hostname:
        description: Machine name where the app runs
        type: string
      numGoroutines:
        description: Current number of active goroutines
        type: integer
      os:
        description: Operating system name
        type: string
      sysMemoryBytes:
        description: Total memory obtained from the OS
        type: integer
      timestamp:
        description: UTC timestamp when health info was collected (RFC3339)
        type: string
      uptimeSeconds:
        description: Application uptime in seconds
        type: number
    type: object
  s0meters.MeterData:
    properties:
      counter:
        description: Total meter value
        type: number
      counterUnit:
        description: Counter unit
        type: string
      gauge:
        description: Flow rate
        type: number
      gaugeUnit:
        description: Gauge unit
        type: string
      timeStamp:
        description: Timestamp of reading
        type: string
    type: object
info:
  contact: {}
paths:
  /health:
    get:
      description: Retrieves memory usage, goroutine count, version, hostname, Go
        runtime version, and OS.
      produces:
      - application/json
      responses:
        "200":
          description: Health data successfully retrieved
          schema:
            $ref: '#/definitions/health.Model'
        "401":
          description: Unauthorized
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Get health data
      tags:
      - info
  /meters:
    get:
      description: Returns the current counter and gauge values for all registered
        S0 meters, keyed by meter name.
      produces:
      - application/json
      responses:
        "200":
          description: Meter readings successfully retrieved
          schema:
            additionalProperties:
              $ref: '#/definitions/s0meters.MeterData'
            type: object
        "401":
          description: Unauthorized
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Get all meter readings
      tags:
      - meters
  /meters/{name}:
    get:
      description: Returns the current counter and gauge values for a specific S0
        meter by name.
      parameters:
      - description: Meter name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Meter reading successfully retrieved
          schema:
            $ref: '#/definitions/s0meters.MeterData'
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: Meter not found
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Get single meter reading
      tags:
      - meters
  /ready:
    get:
      description: Returns 200 if all dependencies are ready, 503 otherwise. No authentication
        required.
      produces:
      - application/json
      responses:
        "200":
          description: Application is ready
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Readiness check
      tags:
      - info
  /version:
    get:
      description: Returns the current application name and version. No authentication
        required.
      produces:
      - application/json
      responses:
        "200":
          description: Application version and name
          schema:
            properties:
              app:
                type: string
              appVersion:
                type: string
            type: object
      summary: Get application version and name
      tags:
      - info
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: X-API-Key
    type: apiKey
swagger: "2.0"
