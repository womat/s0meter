definitions:
  health.Model:
    properties:
      app:
        description: Application name (MODULE)
        type: string
      appVersion:
        description: Current version of the application
        type: string
      goVersion:
        description: Go runtime version
        type: string
      heapAllocBytes:
        description: Allocated heap memory in bytes
        type: integer
      hostname:
        description: Machine name where the app runs
        type: string
      numGoroutines:
        description: Current number of active goroutines
        type: integer
      os:
        description: Operating system name
        type: string
      sysMemoryBytes:
        description: Total memory obtained from the OS
        type: integer
      timestamp:
        description: UTC timestamp when health info was collected (RFC3339)
        type: string
      uptimeSeconds:
        description: Application uptime in seconds
        type: number
    type: object
  s0meters.MeterData:
    properties:
      counter:
        description: Total meter value
        type: number
      gauge:
        description: Flow rate
        type: number
      timeStamp:
        description: Timestamp of reading
        type: string
      unitCounter:
        description: Counter unit
        type: string
      unitGauge:
        description: Gauge unit
        type: string
    type: object
info:
  contact: {}
paths:
  /data:
    get:
      description: |-
        Returns the current counter and gauge values for all registered S0 meters.
        Each entry is keyed by the meter name as defined in the configuration.
        Requires a valid API key in the X-Api-Key header.
      produces:
      - application/json
      responses:
        "200":
          description: Meter readings successfully retrieved
          schema:
            additionalProperties:
              $ref: '#/definitions/s0meters.MeterData'
            type: object
        "401":
          description: Unauthorized — missing or invalid API key
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Get meter readings
      tags:
      - monitoring
  /health:
    get:
      description: Retrieves memory usage, goroutine count, version, hostname, Go
        runtime version, and OS.
      produces:
      - application/json
      responses:
        "200":
          description: Health data successfully retrieved
          schema:
            $ref: '#/definitions/health.Model'
        "401":
          description: Unauthorized
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Get health data
      tags:
      - info
  /ready:
    get:
      description: Checks if the application and its dependencies are ready to serve
        traffic.
      responses:
        "200":
          description: Application is ready
          schema:
            $ref: '#/definitions/health.Model'
      summary: Readiness check
      tags:
      - info
  /version:
    get:
      description: Returns the current application name and version. No authentication
        required.
      produces:
      - application/json
      responses:
        "200":
          description: Application version and name
          schema:
            properties:
              app:
                type: string
              appVersion:
                type: string
            type: object
      summary: Get application version and name
      tags:
      - info
swagger: "2.0"
